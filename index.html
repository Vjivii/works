<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel=”icon” href=”/logo.svg” type=”image/x-icon”>
    <meta property="og:icon" content href="logo.svg">
    <meta property="og:image" content href="logo.svg">
    <link rel="shortcut icon" href="logo.svg" />
    <meta property="og:title" content="Andrew Mutsenko">
    <meta name="description" content="Andrew Mutsenko is a Senior product designer from St. Petersburg">
    <meta property="og:description" content="The personal website of Andrew Mutsenko">
    <meta property="og:site_name" content="Andrew Mutsenko">
    <meta property="og:type" content="website">
    <meta property="og:image" content href="me.jpg">


    <title>Andrew Mutsenko</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&display=swap" rel="stylesheet">

    <style>
      @font-face { font-family: 'Pecita'; src: url('fonts/Pecita.otf') }

    :root{
      --site-font-size: 30px;
      --site-line-height: 38px;
      --link-hover: #3699e4;
    }

    .mirror {
      display: inline-block;
      transform: scaleX(-1);
    }

    .a{
      color: #333;
      transition: color 160ms ease;
      text-decoration-line: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      text-decoration-skip-ink: auto;
      text-decoration-color: #333;
    }

    .a:hover{
      color: var(--link-hover);
      text-decoration-color: currentColor;
    }

    .heart{
      cursor: pointer;
      transition: color 160ms ease;
      user-select: none;
    }

    .heart:hover,
    .heart:focus-visible{
      color: #FF0000;
      outline: none;
    }

    *, *::before, *::after{
      box-sizing: border-box;
    }

    html, body{
      height: 100%;
      margin: 0;
    }

    body{
      background-color: #F7F7F7;
    }

    .container {
      width: 100%;
      height: 100%;
      gap: 24px;
      display: flex;
      align-items: flex-end;
      flex-direction: column;
      flex-wrap: wrap;
      padding: 24px;
      justify-content: flex-end;
    }

    @keyframes slideUpFade{
      from{
        opacity: 0;
        transform: translateY(10px);
      }
      to{
        opacity: 1;
        transform: translateY(0);
      }
    }

    .text{
      animation: slideUpFade 900ms cubic-bezier(.2,.8,.2,1) both;
    }

    .header:nth-of-type(1) > .text:nth-child(1){ animation-delay: 300ms; }
    .header:nth-of-type(1) > .text:nth-child(2){ animation-delay: 300ms; }
    .header:nth-of-type(2) > .text:nth-child(1){ animation-delay: 350ms; }
    .header:nth-of-type(2) > .text:nth-child(2){ animation-delay: 350ms; }

    @media (prefers-reduced-motion: reduce){
      .text{
        animation: none;
        transform: none;
      }
    }

    .text{
      font-family: "Pecita";
      font-variant-numeric: proportional-nums;
      display: flex;
      color: #333;
      flex-direction: column;
      font-size: var(--site-font-size);
      line-height: var(--site-line-height);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-synthesis: none;
    }

    .header{
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
    }

    @media (min-width: 431px){
      html, body{
        overflow: hidden;
      }
    }

    @media (max-width: 430px){
      :root{
        --site-font-size: 26px;
        --site-line-height: 34px;
      }

      .container {
        padding: 16px;
      }

      html, body{
        overflow: hidden;
        overscroll-behavior: none;
      }

      .header{
        flex-direction: column;
        gap: 12px;
      }

      .header > .text{
        width: 100vw !important;
      }
    }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="text" style="width: 75vw;">
          <div>☻  Andrew Mutsenko <br>Senior product designer @ <a class="a" target="_blank" rel="noopener noreferrer" href="https://www.2gis.ru"> 2GIS</a><br>
          Live and work in&nbsp;St.&nbsp;Petersburg,&nbsp;<span id="spb-time">--:-- --</span></div>
        </div>

        <div class="text" style="width: 25vw;">
          <div> ✦  <a class="a" target="_blank" rel="noopener noreferrer" href="http://t.me/andrewvjivii">Telegram</a><br>✦  <a class="a" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/andrewmutsenko/">Linkdein</a><br>✦  <a class="a" target="_blank" rel="noopener noreferrer" href="https://www.are.na/andrew-vjivii/">Are.na</a>
          </div>
        </div>
      </div>

      <div class="header">
        <div class="text" style="width: 75vw;">
          <div><span class="heart" id="heart" role="button" tabindex="0" aria-label="A little compliment">♡</span> — <span id="heart-message">you look amazing</span></div>
        </div>

        <div class="text" style="width: 25vw;">
          <div>☁&#xFE0E;  <span id="spb-temp"> --</span>°C</div>
        </div>
      </div>
    </div>

    <script>
      (function spbTimeAMPM() {
        const el = document.getElementById('spb-time');
        if (!el) return;

        const fmt = new Intl.DateTimeFormat('en-US', {
          timeZone: 'Europe/Moscow',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true,
        });

        function tick() {
          el.textContent = fmt.format(new Date());
        }

        tick();
        setInterval(tick, 1000);
      })();
    </script>

    <script>
      (function heartCompliments() {
        const heart = document.getElementById('heart');
        const message = document.getElementById('heart-message');
        if (!heart || !message) return;

        const compliments = [
          'you look amazing',
          'you look super',
          'today is your day',
          'warmth and love to you',
          'thanks for stopping by',
          'hope your day is gentle',
          'you\'re doing great',
          'sending good vibes',
          'the world is brighter with you in it',
          'take a breath — you\'ve got this',
          'you\'re exactly enough',
          'glad you\'re here',
          'keep being wonderful',
          'you deserve something nice today',
          'someone is rooting for you',
        ];

        let index = 0;

        function nextCompliment() {
          index = (index + 1) % compliments.length;
          message.textContent = compliments[index];
        }

        heart.addEventListener('click', nextCompliment);
        heart.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            nextCompliment();
          }
        });
      })();
    </script>

    <script>
      (function spbWeather() {
        const el = document.getElementById('spb-temp');
        if (!el) return;

        const lat = 59.9386;
        const lon = 30.3141;

        async function load() {
          try {
            const url =
              'https://api.open-meteo.com/v1/forecast' +
              `?latitude=${lat}&longitude=${lon}` +
              '&current=temperature_2m' +
              '&temperature_unit=celsius' +
              '&timezone=Europe%2FMoscow';

            const res = await fetch(url);
            if (!res.ok) throw new Error('Weather fetch failed');
            const data = await res.json();

            const t = data?.current?.temperature_2m;
            if (typeof t === 'number') el.textContent = Math.round(t).toString();
          } catch {
            // keep placeholder if API unavailable
          }
        }

        load();
        setInterval(load, 10 * 60 * 1000);
      })();
    </script>
  </body>
</html>
